<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Premium Color Prediction Terminal</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body {
            background-color: #191e30;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        .app-container {
            max-width: 450px;
            width: 100%;
            min-height: 100vh;
            background-color: #191e30;
        }
        /* Exact color code accents matching the screenshots */
        .bg-panel-dark { background-color: #22273b; }
        .bg-panel-light { background-color: #2e354c; }
        .border-premium { border-color: #373f58; }
        
        /* Color prediction specific button split backgrounds */
        .btn-violet-gradient { background: linear-gradient(135deg, #b030b0 0%, #800080 100%); }
        .btn-green-gradient { background: linear-gradient(135deg, #00b359 0%, #008040 100%); }
        .btn-red-gradient { background: linear-gradient(135deg, #ff4d4d 0%, #cc0000 100%); }
        
        /* Half Red Half Violet split background for specific digits like 0 and 5 */
        .split-0 { background: linear-gradient(135deg, #ff4d4d 50%, #b030b0 50%); }
        .split-5 { background: linear-gradient(135deg, #00b359 50%, #b030b0 50%); }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#0f121d]">

    <div class="app-container relative flex flex-col justify-between pb-20 shadow-2xl border-x border-[#2e354c]">
        
        <div class="p-4 bg-panel-dark border-b border-premium flex items-center justify-between sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-panel-light border border-premium flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-user text-lg"></i>
                </div>
                <div>
                    <div id="userUID" class="text-sm font-bold font-mono tracking-wide">Member_54329</div>
                    <div class="text-[10px] text-slate-400 font-mono">ID: 8709913752</div>
                </div>
            </div>
            
            <div class="text-right">
                <span class="text-[10px] text-slate-400 block uppercase tracking-wider">Wallet Balance</span>
                <div class="flex items-center gap-1.5 justify-end">
                    <span id="globalWalletBalance" class="text-base font-black font-mono text-amber-400">500.00</span>
                    <span class="text-xs text-amber-500 font-bold">BHD</span>
                    <i onclick="window.syncWalletBalance()" class="fa-solid fa-rotate-right text-xs text-slate-400 ml-1 cursor-pointer active:rotate-180 transition-transform duration-300"></i>
                </div>
            </div>
        </div>

        <div class="px-4 pt-3">
            <div class="grid grid-cols-4 gap-2 p-1 bg-panel-dark rounded-xl border border-premium text-center">
                <button id="timeTab_1m" onclick="window.changeTimeDomain(60, '1m')" class="py-2 rounded-lg font-bold text-xs bg-panel-light border border-blue-500 text-white">
                    <div>Win Go</div>
                    <div class="text-[10px] text-blue-400 font-mono">1 Min</div>
                </button>
                <button id="timeTab_3m" onclick="window.changeTimeDomain(180, '3m')" class="py-2 rounded-lg font-bold text-xs text-slate-400">
                    <div>Win Go</div>
                    <div class="text-[10px] text-slate-500 font-mono">3 Min</div>
                </button>
                <button id="timeTab_5m" onclick="window.changeTimeDomain(300, '5m')" class="py-2 rounded-lg font-bold text-xs text-slate-400">
                    <div>Win Go</div>
                    <div class="text-[10px] text-slate-500 font-mono">5 Min</div>
                </button>
                <button id="timeTab_10m" onclick="window.changeTimeDomain(600, '10m')" class="py-2 rounded-lg font-bold text-xs text-slate-400">
                    <div>Win Go</div>
                    <div class="text-[10px] text-slate-500 font-mono">10 Min</div>
                </button>
            </div>
        </div>

        <div class="p-4 space-y-4 flex-1 overflow-y-auto">
            
            <div class="bg-panel-dark border border-premium rounded-2xl p-4 flex justify-between items-center relative overflow-hidden">
                <div class="space-y-1">
                    <div class="flex items-center gap-1.5 text-xs text-slate-400 font-bold uppercase tracking-wider">
                        <i class="fa-solid fa-circle-info text-blue-400"></i> Current Period
                    </div>
                    <div id="currentPeriodId" class="text-lg font-black font-mono tracking-wider text-white">202605300001</div>
                </div>
                
                <div class="text-right">
                    <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-wider mb-1">Time Remaining</span>
                    <div id="countdownClockDisplay" class="text-2xl font-black font-mono text-rose-500 tracking-widest bg-panel-light px-3 py-1 rounded-xl border border-premium inline-block">00:45</div>
                </div>
            </div>

            <div class="grid grid-cols-3 gap-3">
                <button onclick="window.openBetOverlay('Green')" class="btn-green-gradient py-3 text-white text-xs font-black rounded-xl tracking-widest uppercase shadow-lg active:scale-95 transition-transform">
                    Join Green
                </button>
                <button onclick="window.openBetOverlay('Violet')" class="btn-violet-gradient py-3 text-white text-xs font-black rounded-xl tracking-widest uppercase shadow-lg active:scale-95 transition-transform">
                    Join Violet
                </button>
                <button onclick="window.openBetOverlay('Red')" class="btn-red-gradient py-3 text-white text-xs font-black rounded-xl tracking-widest uppercase shadow-lg active:scale-95 transition-transform">
                    Join Red
                </button>
            </div>

            <div class="bg-panel-dark border border-premium p-4 rounded-2xl">
                <div class="grid grid-cols-5 gap-3">
                    <button onclick="window.openBetOverlay('0')" class="split-0 w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">0</button>
                    <button onclick="window.openBetOverlay('1')" class="btn-green-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">1</button>
                    <button onclick="window.openBetOverlay('2')" class="btn-red-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">2</button>
                    <button onclick="window.openBetOverlay('3')" class="btn-green-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">3</button>
                    <button onclick="window.openBetOverlay('4')" class="btn-red-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">4</button>
                    <button onclick="window.openBetOverlay('5')" class="split-5 w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">5</button>
                    <button onclick="window.openBetOverlay('6')" class="btn-red-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">6</button>
                    <button onclick="window.openBetOverlay('7')" class="btn-green-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">7</button>
                    <button onclick="window.openBetOverlay('8')" class="btn-red-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">8</button>
                    <button onclick="window.openBetOverlay('9')" class="btn-green-gradient w-full aspect-square rounded-full flex items-center justify-center text-base font-black font-mono text-white shadow-md active:scale-90 transition-transform">9</button>
                </div>

                <div class="grid grid-cols-2 gap-4 mt-4 pt-4 border-t border-premium">
                    <button onclick="window.openBetOverlay('Big')" class="py-3 bg-panel-light border border-premium text-cyan-400 font-black text-xs rounded-xl uppercase tracking-widest active:scale-95 transition-transform">Big</button>
                    <button onclick="window.openBetOverlay('Small')" class="py-3 bg-panel-light border border-premium text-amber-400 font-black text-xs rounded-xl uppercase tracking-widest active:scale-95 transition-transform">Small</button>
                </div>
            </div>

            <div class="bg-panel-dark border border-premium rounded-2xl overflow-hidden">
                <div class="flex border-b border-premium text-center font-bold text-xs">
                    <button onclick="window.switchRecordTab('gameRecord')" id="recTab_game" class="flex-1 py-3 bg-panel-light text-blue-400 border-b-2 border-blue-500">Game Record</button>
                    <button onclick="window.switchRecordTab('myRecord')" id="recTab_my" class="flex-1 py-3 text-slate-400">My History</button>
                </div>

                <div class="p-3">
                    <table class="w-full text-left font-mono text-[11px]">
                        <thead>
                            <tr class="text-slate-400 border-b border-premium">
                                <th class="pb-2">Period ID</th>
                                <th class="pb-2">Number</th>
                                <th class="pb-2">Size</th>
                                <th class="pb-2 text-right">Color</th>
                            </tr>
                        </thead>
                        <tbody id="recordTableBody">
                            </tbody>
                    </table>
                </div>
            </div>

        </div>

        <div class="bg-panel-dark border-t border-premium p-1 fixed bottom-0 app-container w-full z-50 flex justify-around">
            <button class="flex flex-col items-center gap-0.5 text-blue-500 py-2 px-4"><i class="fa-solid fa-gamepad text-base"></i><span class="text-[9px] font-bold uppercase tracking-wider">Home</span></button>
            <button class="flex flex-col items-center gap-0.5 text-slate-500 py-2 px-4"><i class="fa-solid fa-trophy text-base"></i><span class="text-[9px] font-bold uppercase tracking-wider">Activity</span></button>
            <button class="flex flex-col items-center gap-0.5 text-slate-500 py-2 px-4"><i class="fa-solid fa-share-nodes text-base"></i><span class="text-[9px] font-bold uppercase tracking-wider">Invite</span></button>
            <button class="flex flex-col items-center gap-0.5 text-slate-500 py-2 px-4"><i class="fa-solid fa-wallet text-base"></i><span class="text-[9px] font-bold uppercase tracking-wider">Wallet</span></button>
        </div>

        <div id="betModalOverlay" class="fixed inset-0 bg-black/70 z-[200] flex items-center justify-center p-4 hidden">
            <div class="bg-panel-dark border border-premium rounded-2xl p-5 w-full max-w-xs space-y-4 shadow-2xl">
                <div class="text-center">
                    <span class="text-[10px] text-slate-400 font-bold block uppercase tracking-widest">Selected Option</span>
                    <h4 id="modalSelectionTitle" class="text-lg font-black text-white uppercase mt-0.5">Green</h4>
                </div>
                
                <div class="space-y-2">
                    <label class="text-[10px] text-slate-400 block font-bold uppercase">Stake Amount (BHD)</label>
                    <div class="grid grid-cols-4 gap-2 text-center text-xs font-mono font-bold">
                        <button onclick="window.setPresetBetAmount(5)" class="py-1.5 bg-panel-light border border-premium rounded-lg text-slate-200">5</button>
                        <button onclick="window.setPresetBetAmount(10)" class="py-1.5 bg-panel-light border border-premium rounded-lg text-slate-200">10</button>
                        <button onclick="window.setPresetBetAmount(50)" class="py-1.5 bg-panel-light border border-premium rounded-lg text-slate-200">50</button>
                        <button onclick="window.setPresetBetAmount(100)" class="py-1.5 bg-panel-light border border-premium rounded-lg text-slate-200">100</button>
                    </div>
                    <input type="number" id="inputBetAmount" value="10" class="w-full px-4 py-2 bg-[#191e30] border border-premium rounded-xl text-sm font-mono text-center text-white focus:outline-none focus:border-blue-500">
                </div>

                <div class="grid grid-cols-2 gap-3 pt-1 text-xs font-bold">
                    <button onclick="window.closeBetOverlay()" class="py-2.5 bg-panel-light border border-premium text-slate-300 rounded-xl">CANCEL</button>
                    <button onclick="window.confirmBetPlacement()" class="py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-black rounded-xl uppercase tracking-wider">CONFIRM</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        let currentIntervalDuration = 60; // Default 1 Min loop scope
        let secondsRemainingCounter = 60;
        let selectedBetTargetKey = null;
        let activeWalletBalanceValue = 500.00;

        // Dummy datasets mimicking the exact UI results history pattern logs
        let dummyGameHistoryRecords = [
            { period: "202605300142", number: "3", size: "Small", color: "Green", dotColor: "bg-green-500" },
            { period: "202605300141", number: "8", size: "Big", color: "Red", dotColor: "bg-red-500" },
            { period: "202605300140", number: "0", size: "Small", color: "Red/Violet", dotColor: "split-0" },
            { period: "202605300139", number: "7", size: "Big", color: "Green", dotColor: "bg-green-500" },
            { period: "202605300138", number: "2", size: "Small", color: "Red", dotColor: "bg-red-500" }
        ];

        // Core 1-Second Runtime Execution Frame Continuous Loop
        setInterval(() => {
            if (secondsRemainingCounter <= 1) {
                secondsRemainingCounter = currentIntervalDuration;
                // Generate a fresh structural period timestamp record simulation block on lapse
                generateRandomCycleOutcome();
            } else {
                secondsRemainingCounter--;
            }

            // UI Clock Text Interpolation Alignment
            let minutesSegment = Math.floor(secondsRemainingCounter / 60);
            let secondsSegment = secondsRemainingCounter % 60;
            document.getElementById('countdownClockDisplay').innerText = 
                `${minutesSegment.toString().padStart(2, '0')}:${secondsSegment.toString().padStart(2, '0')}`;
        }, 1000);

        function generateRandomCycleOutcome() {
            let luckyNum = Math.floor(Math.random() * 10);
            let sizeAttr = luckyNum >= 5 ? "Big" : "Small";
            let colorAttr = "Green";
            let dotClass = "bg-green-500";

            if (luckyNum % 2 === 0 && luckyNum !== 0) { colorAttr = "Red"; dotClass = "bg-red-500"; }
            else if (luckyNum === 0) { colorAttr = "Red/Violet"; dotClass = "split-0"; }
            else if (luckyNum === 5) { colorAttr = "Green/Violet"; dotClass = "split-5"; }

            let generatedPeriodId = document.getElementById('currentPeriodId').innerText;
            
            dummyGameHistoryRecords.unshift({
                period: generatedPeriodId, number: luckyNum.toString(), size: sizeAttr, color: colorAttr, dotColor: dotClass
            });
            if (dummyGameHistoryRecords.length > 8) dummyGameHistoryRecords.pop();

            // Auto-increment the baseline system period tracking header value string
            document.getElementById('currentPeriodId').innerText = parseInt(generatedPeriodId) + 1;
            renderHistoryRecordsTableBody();
        }

        function renderHistoryRecordsTableBody() {
            const tableContainerRef = document.getElementById('recordTableBody');
            tableContainerRef.innerHTML = "";
            
            dummyGameHistoryRecords.forEach(record => {
                let colorBadgeMarkup = record.dotColor.includes('split') 
                    ? `<div class="w-3 h-3 rounded-full inline-block ${record.dotColor}"></div>` 
                    : `<div class="w-3 h-3 rounded-full inline-block ${record.dotColor}"></div>`;
                
                tableContainerRef.innerHTML += `
                    <tr class="border-b border-[#2e354c]/40 text-slate-300">
                        <td class="py-2.5 font-bold">${record.period}</td>
                        <td class="py-2.5 font-black text-white">${record.number}</td>
                        <td class="py-2.5 ${record.size === 'Big' ? 'text-cyan-400' : 'text-amber-400'}">${record.size}</td>
                        <td class="py-2.5 text-right flex items-center justify-end gap-1.5">${record.color} ${colorBadgeMarkup}</td>
                    </tr>
                `;
            });
        }

        window.changeTimeDomain = function(totalSeconds, tabKeyId) {
            currentIntervalDuration = totalSeconds;
            secondsRemainingCounter = totalSeconds;
            
            for (let id of ['1m', '3m', '5m', '10m']) {
                const btn = document.getElementById('timeTab_' + id);
                btn.className = "py-2 rounded-lg font-bold text-xs text-slate-400";
            }
            document.getElementById('timeTab_' + tabKeyId).className = "py-2 rounded-lg font-bold text-xs bg-panel-light border border-blue-500 text-white";
        };

        window.openBetOverlay = function(targetKey) {
            selectedBetTargetKey = targetKey;
            document.getElementById('modalSelectionTitle').innerText = "Join " + targetKey;
            document.getElementById('betModalOverlay').classList.remove('hidden');
        };

        window.closeBetOverlay = function() {
            document.getElementById('betModalOverlay').classList.add('hidden');
        };

        window.setPresetBetAmount = function(val) {
            document.getElementById('inputBetAmount').value = val;
        };

        window.confirmBetPlacement = function() {
            const betAmt = parseFloat(document.getElementById('inputBetAmount').value);
            if(isNaN(betAmt) || betAmt <= 0 || betAmt > activeWalletBalanceValue) {
                alert("Transaction Exception: Invalid capital bounds allocation structural weight.");
                return;
            }
            activeWalletBalanceValue -= betAmt;
            document.getElementById('globalWalletBalance').innerText = activeWalletBalanceValue.toFixed(2);
            alert(`Bet success registered on vector segment target: ${selectedBetTargetKey.toUpperCase()}`);
            window.closeBetOverlay();
        };

        window.syncWalletBalance = function() {
            alert("Ledger synchronization database clusters refresh verified in 12ms.");
        };

        window.switchRecordTab = function(type) {
            if(type === 'gameRecord') {
                document.getElementById('recTab_game').className = "flex-1 py-3 bg-panel-light text-blue-400 border-b-2 border-blue-500";
                document.getElementById('recTab_my').className = "flex-1 py-3 text-slate-400";
                renderHistoryRecordsTableBody();
            } else {
                document.getElementById('recTab_game').className = "flex-1 py-3 text-slate-400";
                document.getElementById('recTab_my').className = "flex-1 py-3 bg-panel-light text-blue-400 border-b-2 border-blue-500";
                document.getElementById('recordTableBody').innerHTML = `<tr><td colspan="4" class="text-center py-6 text-slate-500">No trading logs found for current identity sub-node.</td></tr>`;
            }
        };

        // Initialize Table View Render Elements Frame On Initial Execution Runtime
        renderHistoryRecordsTableBody();
    </script>
</body>
</html>
